<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAIST GO | 新規登録</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{ --ink:#14201a; --muted:#5d6f64; --line:#e4ece6; --green:#177a5b; --green-deep:#0e5f47; --amber:#f0c04a; }
        *{ box-sizing:border-box; }
        html,body{ height:100%; }
        body{ margin:0; color:var(--ink); font-family:"Space Grotesk","Zen Kaku Gothic New",system-ui,sans-serif; background:#eef3f0; -webkit-font-smoothing:antialiased; }
        .auth{ min-height:100vh; min-height:100dvh; display:grid; grid-template-columns:1.05fr 1fr; }

        .brand-panel{ position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:space-between; padding:40px clamp(32px,4vw,56px); color:#fff; background:radial-gradient(125% 125% at 0% 0%, #1c8a67 0%, #0e5f47 46%, #0a4334 100%); }
        .brand-top{ position:relative; z-index:2; display:flex; align-items:center; gap:12px; }
        .brand-mark{ display:grid; place-items:center; width:42px; height:42px; border-radius:11px; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22); font-weight:700; font-size:16px; letter-spacing:.02em; }
        .brand-word{ font-weight:600; font-size:19px; letter-spacing:.02em; }
        .brand-hero{ position:relative; z-index:2; margin:auto 0; max-width:30ch; }
        .brand-hero h1{ margin:0 0 14px; font-size:clamp(26px,3vw,33px); font-weight:700; line-height:1.28; letter-spacing:.01em; }
        .brand-hero p{ margin:0; font-size:15px; line-height:1.75; color:rgba(255,255,255,.78); }
        .brand-foot{ position:relative; z-index:2; font-size:12.5px; letter-spacing:.02em; color:rgba(255,255,255,.62); }
        .route-svg{ position:absolute; right:-4%; top:50%; transform:translateY(-47%); width:min(70%,400px); height:auto; z-index:1; pointer-events:none; }
        .route-svg text{ fill:#fff; font-family:"Space Grotesk",sans-serif; font-size:13px; font-weight:600; letter-spacing:.03em; }
        .route-flow{ stroke-dasharray:2 11; animation:flow 1.1s linear infinite; }
        @keyframes flow{ to{ stroke-dashoffset:-13; } }

        .form-panel{ display:flex; align-items:center; justify-content:center; padding:48px clamp(24px,5vw,40px); background:#fff; }
        .form-inner{ width:100%; max-width:360px; }
        .eyebrow{ display:inline-block; margin:0 0 10px; font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--green); }
        .form-inner h2{ margin:0 0 8px; font-size:28px; font-weight:700; letter-spacing:.01em; }
        .lede{ margin:0 0 28px; color:var(--muted); font-size:15px; line-height:1.7; }
        form{ display:grid; gap:16px; }
        .field{ display:grid; gap:7px; animation:rise .5s ease both; }
        .field:nth-of-type(2){ animation-delay:.05s; }
        .field:nth-of-type(3){ animation-delay:.1s; }
        .field:nth-of-type(4){ animation-delay:.15s; }
        .field > span{ font-size:13px; font-weight:600; color:var(--muted); }
        .field input{ width:100%; padding:13px 14px; font-size:15px; color:var(--ink); background:#fff; border:1px solid var(--line); border-radius:12px; transition:border-color .15s, box-shadow .15s; }
        .field input::placeholder{ color:#aab6ae; }
        .field input:focus{ outline:none; border-color:var(--green); box-shadow:0 0 0 4px rgba(23,122,91,.13); }
        .submit{ margin-top:6px; width:100%; padding:14px; font:inherit; font-size:15px; font-weight:600; color:#fff; background:var(--green); border:0; border-radius:12px; cursor:pointer; transition:transform .12s, box-shadow .18s, background .15s; }
        .submit:hover{ background:var(--green-deep); box-shadow:0 10px 24px rgba(14,95,71,.28); transform:translateY(-1px); }
        .submit:active{ transform:translateY(0); }
        .alt{ margin:22px 0 0; padding-top:20px; border-top:1px solid var(--line); font-size:14px; color:var(--muted); text-align:center; }
        .alt a{ color:var(--green-deep); font-weight:600; }
        .alt a:hover{ text-decoration:underline; }
        .msg{ margin:0 0 16px; padding:12px 14px; border-radius:11px; font-size:14px; font-weight:500; }
        .msg-err{ background:#fdeef0; color:#b0364b; border:1px solid rgba(176,54,75,.25); }
        @keyframes rise{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }

        @media (max-width:840px){
            .auth{ grid-template-columns:1fr; }
            .brand-panel{ padding:26px 24px 30px; }
            .brand-hero{ margin:20px 0 4px; max-width:none; }
            .brand-hero h1{ font-size:23px; }
            .brand-hero p,.brand-foot,.route-svg{ display:none; }
            .form-panel{ padding:34px 24px 48px; }
        }
        @media (prefers-reduced-motion: reduce){
            .route-flow{ animation:none; }
            .field{ animation:none; }
        }
    </style>
</head>
<body>
    <div class="auth">
        <aside class="brand-panel">
            <div class="brand-top">
                <span class="brand-mark">JG</span>
                <span class="brand-word">JAIST GO</span>
            </div>
            <div class="brand-hero">
                <h1>仲間と動く、<br>はじめの一歩。</h1>
                <p>アカウントを作って、相乗りやお出かけの輪に加わろう。</p>
            </div>
            <div class="brand-foot">石川県能美市・JAIST生のためのモビリティ掲示板</div>

            <svg class="route-svg" viewBox="0 0 360 460" fill="none" aria-hidden="true">
                <g stroke="#fff" stroke-opacity="0.07" stroke-width="1.5">
                    <path d="M-20 330 C 80 295, 130 350, 210 312 S 350 280, 380 322"/>
                    <path d="M-20 372 C 90 338, 140 392, 220 356 S 360 322, 380 366"/>
                    <path d="M-20 412 C 70 380, 140 430, 215 398 S 355 364, 380 406"/>
                </g>
                <path d="M70 408 C 92 356, 140 330, 168 250 C 196 184, 248 150, 290 108" stroke="#fff" stroke-opacity="0.20" stroke-width="6" stroke-linecap="round"/>
                <path class="route-flow" d="M70 408 C 92 356, 140 330, 168 250 C 196 184, 248 150, 290 108" stroke="#f0c04a" stroke-width="3" stroke-linecap="round"/>
                <g><circle cx="70" cy="408" r="8" fill="#fff"/><circle cx="70" cy="408" r="3.4" fill="#0e5f47"/><text x="84" y="412">JAIST</text></g>
                <g><circle cx="168" cy="250" r="8" fill="#fff"/><circle cx="168" cy="250" r="3.4" fill="#0e5f47"/><text x="182" y="254">鶴来駅</text></g>
                <g><circle cx="290" cy="108" r="9" fill="#f0c04a"/><circle cx="290" cy="108" r="4" fill="#0e5f47"/><text x="244" y="94">買い物</text></g>
            </svg>
        </aside>

        <main class="form-panel">
            <div class="form-inner">
                <span class="eyebrow">新規登録</span>
                <h2>はじめよう</h2>
                <p class="lede">アカウントを作成して JAIST GO に参加しましょう。</p>

                {% if error %}<p class="msg msg-err">{{ error }}</p>{% endif %}

                <form method="post" action="{{ url_for('register') }}">
                    <label class="field">
                        <span>ユーザー名</span>
                        <input name="username" type="text" autocomplete="username" placeholder="username" required>
                    </label>
                    <label class="field">
                        <span>パスワード（8文字以上）</span>
                        <input name="password" type="password" autocomplete="new-password" placeholder="••••••••" required>
                    </label>
                    <label class="field">
                        <span>パスワード（確認）</span>
                        <input name="password_confirm" type="password" autocomplete="new-password" placeholder="••••••••" required>
                    </label>
                    <button type="submit" class="submit">アカウントを作成</button>
                </form>

                <p class="alt">すでにアカウントをお持ちの方は <a href="{{ url_for('login') }}">ログイン</a></p>
            </div>
        </main>
    </div>
</body>
</html>

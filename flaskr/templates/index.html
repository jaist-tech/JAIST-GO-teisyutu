<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JAIST GO</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        h1, p {
            margin-left: 16px;
        }

        #map {
            height: 80%;
            width: 100%;
        }
    </style>
</head>

<body>
    <h1>JAIST GO</h1>
    <p>Welcome to JAIST GO!</p>

    <div id="map"></div>

    <script src="https://maps.google.com/maps/api/js?key={{ google_map_api_key }}&language=ja"></script>

    <script>
        const locationData = {
            lat: {{ location.lat }},
            lng: {{ location.lng }},
            title: "{{ location.title }}"
        };

        const myLatLng = new google.maps.LatLng(
            locationData.lat,
            locationData.lng
        );

        const map = new google.maps.Map(
            document.getElementById("map"),
            {
                zoom: 15,
                center: myLatLng,
                mapTypeId: "roadmap"
            }
        );

        const marker = new google.maps.Marker({
            position: myLatLng,
            map: map,
            title: locationData.title
        });
    </script>
</body>
</html>

<div class="auth-status">
    {% if current_user %}
        <span class="user-badge" title="ログイン中のユーザー">{{ current_user.username }}</span>
        <form class="logout-form" method="post" action="{{ url_for('logout') }}">
            <button type="submit" class="ghost-button">ログアウト</button>
        </form>
    {% else %}
        <a class="primary-button" href="{{ url_for('register') }}">新規登録</a>
        <a href="{{ url_for('login', next=request.path) }}">ログイン</a>
    {% endif %}
</div>
